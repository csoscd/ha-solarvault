name: Bug Report
description: Something is not working correctly in the integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a bug report, please check the [existing issues](https://github.com/csoscd/ha-solarvault/issues) and the [CHANGELOG](https://github.com/csoscd/ha-solarvault/blob/main/CHANGELOG.md) to see if the problem is already known or fixed.

  - type: dropdown
    id: device
    attributes:
      label: Jackery Device
      description: Which device(s) are you using?
      multiple: true
      options:
        - SolarVault 3 Pro Max
        - SolarVault 3 Pro
        - SmartMeter 3P (HTO907A)
        - SmartMeter D0 Reader
        - BP2500 Expansion Battery
        - Smart Plug
        - Other (describe below)
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: Integration Version
      description: Which version of ha-solarvault are you running? (check HACS or manifest.json)
      placeholder: "e.g. 2.0.0"
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      placeholder: "e.g. 2026.7.3"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What is happening, and what did you expect to happen?
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: |
        Enable debug logging for the integration and paste relevant entries here.
        Add to your `configuration.yaml`:
        ```yaml
        logger:
          default: warning
          logs:
            custom_components.jackery: debug
        ```
      render: text
    validations:
      required: false

  - type: textarea
    id: mqtt_trace
    attributes:
      label: MQTT Trace (if applicable)
      description: |
        If the bug relates to sensor values or missing data, a raw MQTT capture helps enormously.
        Subscribe with: `mosquitto_sub -t 'hb/#' -v`
        Paste a few relevant messages here (redact your token if present).
      render: text
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else that might be relevant (firmware version, network setup, recent changes, etc.)
    validations:
      required: false
