name: Feature Request
description: Suggest a new sensor, control entity, or integration capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check the [README](https://github.com/csoscd/ha-solarvault/blob/main/README.md) first — many control entities and sensors are already implemented.
        Note that features requiring **cloud access or schedules** cannot be implemented via local MQTT.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use Case / Motivation
      description: Why is this useful? What automation or dashboard would benefit from it?
    validations:
      required: true

  - type: dropdown
    id: mqtt_available
    attributes:
      label: Is the relevant MQTT data already visible?
      description: Can you see the value in raw MQTT messages (`mosquitto_sub -t 'hb/#' -v`)?
      options:
        - "Yes — I can see the field in MQTT and will paste it below"
        - "No — I don't know if it's available via MQTT"
        - "No — it appears to be cloud-only"
    validations:
      required: true

  - type: textarea
    id: mqtt_data
    attributes:
      label: Relevant MQTT Data
      description: If you answered "Yes" above, paste the relevant MQTT field name(s) and an example payload.
      render: json
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
    validations:
      required: false
